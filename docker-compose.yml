version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: ia_trabalhista_db
    environment:
      POSTGRES_DB: ia_trabalhista
      POSTGRES_USER: ia_user
      POSTGRES_PASSWORD: ia_pass
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ia_user -d ia_trabalhista"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
